  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  const FONT_MIME = /^(font[/]|application[/](x-)?font-|application[/]vnd\.ms-fontobject)/i;
  const MIME_TOKEN = /^[\w.+-]+[/][\w.+-]+$/;
  function toBase64(bytes) {
    let bin = '';
    for (let i = 0; i < bytes.length; i += 0x8000) {
      bin += String.fromCharCode.apply(null, bytes.subarray(i, i + 0x8000));
    }
    return btoa(bin);
  }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    // Failed resource loads (CSP-blocked links, scripts, images) fire plain
    // events at the element — warn only; real JS errors carry message/error.
    if (!e.message && !e.error && e.target && e.target !== window) {
      console.warn('[bundle] resource failed to load:',
        e.target.tagName, String(e.target.src || e.target.href || ''));
      return;
    }
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    const resourceBlobs = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        if (FONT_MIME.test(entry.mime) && MIME_TOKEN.test(entry.mime)) {
          // Strict artifact hosts allow font-src data: but not blob:.
          blobUrls[uuid] = 'data:' + entry.mime + ';base64,' +
            (entry.compressed ? toBase64(finalBytes) : entry.data);
        } else {
          const blob = new Blob([finalBytes], { type: entry.mime });
          blobUrls[uuid] = URL.createObjectURL(blob);
          resourceBlobs[blobUrls[uuid]] = blob;
        }
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        const blob = new Blob([], { type: entry.mime });
        blobUrls[uuid] = URL.createObjectURL(blob);
        resourceBlobs[blobUrls[uuid]] = blob;
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    // Artifact-host CSP (connect-src 'self') refuses fetch() of blob: URLs —
    // consumers read these Blobs directly. Survives the swap like the error sink.
    window.__resourceBlobs = resourceBlobs;

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).replace(/<\//g, '<\\/') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: read and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const pre = resourceBlobs[s.src.split('#')[0]];
        s.textContent = pre ? await pre.text() : await (await fetch(s.src)).text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

ndex: 1; display: flex; flex-direction: column; align-items: center; min-height: 100vh; padding: 3rem 1.5rem 4rem; }\n  .badge { display: inline-flex; align-items: center; gap: 6px; background: rgba(124,58,237,0.15); border: 1px solid rgba(124,58,237,0.4); border-radius: 999px; padding: 5px 14px; font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #c084fc; margin-bottom: 1.2rem; }\n  .badge::before { content: \"●\"; font-size: 8px; animation: pulse 1.6s ease infinite; }\n  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: .3; } }\n  h1 { font-size: clamp(2rem, 5vw, 3.2rem); font-weight: 900; text-align: center; line-height: 1.1; margin-bottom: .7rem; background: linear-gradient(135deg, #fff 30%, #c084fc 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; }\n  .subtitle { color: #8b8ba0; font-size: 15px; margin-bottom: 3rem; text-align: center; }\n  .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(260px, 1fr)); gap: 1.5rem; width: 100%; max-width: 1180px; }\n  .card { background: rgba(18,18,28,0.85); border: 1px solid rgba(255,255,255,0.07); border-radius: 20px; overflow: hidden; cursor: pointer; transition: transform .25s cubic-bezier(.34,1.56,.64,1), box-shadow .25s ease, border-color .25s; backdrop-filter: blur(12px); }\n  .card:hover { transform: translateY(-6px) scale(1.01); }\n  .card-thumb-wrap { width: 100%; height: 170px; overflow: hidden; position: relative; }\n  .card-thumb-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s ease; }\n  .card:hover .card-thumb-wrap img { transform: scale(1.06); }\n  .card-thumb-wrap::after { content: ''; position: absolute; bottom: 0; left: 0; right: 0; height: 70px; background: linear-gradient(to top, rgba(10,10,20,.9) 0%, transparent 100%); pointer-events: none; }\n  .card-body { padding: 1.2rem 1.3rem 1.4rem; }\n  .card-tag { display: inline-block; font-size: 10px; font-weight: 700; letter-spacing: .1em; text-transform: uppercase; padding: 3px 10px; border-radius: 999px; margin-bottom: .6rem; }\n  .gag .card-tag { background: rgba(20,184,166,.18); color: #5eead4; border: 1px solid rgba(20,184,166,.35); }\n  .mm2 .card-tag { background: rgba(124,58,237,.18); color: #c084fc; border: 1px solid rgba(124,58,237,.35); }\n  .sab .card-tag { background: rgba(233,69,96,.18); color: #fb7185; border: 1px solid rgba(233,69,96,.35); }\n  .bf .card-tag { background: rgba(245,158,11,.18); color: #fbbf24; border: 1px solid rgba(245,158,11,.35); }\n  .card-title { font-size: 18px; font-weight: 800; margin-bottom: .35rem; color: #fff; }\n  .card-desc { font-size: 13px; color: #8b8ba0; line-height: 1.55; margin-bottom: 1rem; }\n  .card-btn { display: flex; align-items: center; justify-content: center; gap: 7px; width: 100%; padding: 10px 0; border-radius: 10px; border: none; font-size: 13px; font-weight: 700; letter-spacing: .04em; cursor: pointer; transition: filter .2s, transform .15s; }\n  .card-btn:active { transform: scale(.97); }\n  .card-btn:hover { filter: brightness(1.12); }\n  .gag .card-btn { background: linear-gradient(90deg,#059669,#14b8a6); color: #fff; }\n  .mm2 .card-btn { background: linear-gradient(90deg,#6d28d9,#a855f7); color: #fff; }\n  .sab .card-btn { background: linear-gradient(90deg,#be123c,#e94560); color: #fff; }\n  .bf .card-btn { background: linear-gradient(90deg,#b45309,#f59e0b); color: #fff; }\n  .overlay { position: fixed; inset: 0; background: rgba(0,0,0,.7); backdrop-filter: blur(6px); z-index: 100; display: flex; align-items: center; justify-content: center; padding: 1.5rem; opacity: 0; pointer-events: none; transition: opacity .2s; }\n  .overlay.open { opacity: 1; pointer-events: all; }\n  .modal { background: #10101c; border: 1px solid rgba(255,255,255,.1); border-radius: 20px; width: 100%; max-width: 540px; overflow: hidden; transform: translateY(20px) scale(.97); transition: transform .3s cubic-bezier(.34,1.56,.64,1); }\n  .overlay.open .modal { transform: translateY(0) scale(1); }\n  .modal-banner { width: 100%; height: 160px; object-fit: cover; display: block; }\n  .modal-inner { padding: 1.5rem 1.6rem 1.7rem; }\n  .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 1.2rem; }\n  .modal-title { font-size: 17px; font-weight: 800; color: #fff; }\n  .close-btn { width: 32px; height: 32px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.07); background: rgba(255,255,255,.05); color: #8b8ba0; font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: background .15s, color .15s; line-height: 1; }\n  .close-btn:hover { background: rgba(255,255,255,.12); color: #fff; }\n  .modal-label { font-size: 11px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: #8b8ba0; margin-bottom: .5rem; }\n  .script-box { background: #07070f; border: 1px solid rgba(255,255,255,.08); border-radius: 12px; padding: 1rem 1.1rem; font-family: 'Courier New', monospace; font-size: 12px; color: #a5f3fc; word-break: break-all; line-height: 1.6; margin-bottom: 1rem; user-select: all; }\n  .copy-btn { width: 100%; padding: 12px; border-radius: 11px; border: none; font-size: 14px; font-weight: 700; letter-spacing: .05em; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: all .2s; }\n  .copy-btn.idle { background: linear-gradient(90deg,#6d28d9,#a855f7); color: #fff; }\n  .copy-btn.success { background: linear-gradient(90deg,#059669,#10b981); color: #fff; }\n  .copy-btn:hover { filter: brightness(1.1); }\n  .copy-btn:active { transform: scale(.98); }\n  .footer { margin-top: 3.5rem; text-align: center; font-size: 12px; color: #3d3d55; }\n  @media (max-width: 600px) { h1 { font-size: 1.8rem; } .grid { grid-template-columns: 1fr; } }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<canvas id=\"stars-canvas\"><\u002Fcanvas>\n\n<div class=\"page\">\n  <div class=\"badge\">Roblox Script Hub<\u002Fdiv>\n  <h1>Khang Script Hub<\u002Fh1>\n  <p class=\"subtitle\">Select a game to get the script — copy with one click, paste into your executor.<\u002Fp>\n\n  <div class=\"grid\">\n    <div class=\"card gag\" onclick=\"openModal('gag')\">\n      <div class=\"card-thumb-wrap\"><img src=\"099a3288-0a38-41ff-b9ac-36574c87fe21\" alt=\"Grow A Garden 2\" loading=\"lazy\"><\u002Fdiv>\n      <div class=\"card-body\">\n        <span class=\"card-tag\">Simulator<\u002Fspan>\n        <div class=\"card-title\">Grow A Garden 2<\u002Fdiv>\n        <p class=\"card-desc\">Auto farm, auto collect, speed hack and many other powerful features.<\u002Fp>\n        <button class=\"card-btn\"><svg width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" viewBox=\"0 0 24 24\"><path d=\"M8 9l4-4 4 4M12 5v11M5 19h14\"><\u002Fpath><\u002Fsvg>Get Script<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card mm2\" onclick=\"openModal('mm2')\">\n      <div class=\"card-thumb-wrap\"><img src=\"2acaa973-e41c-4b17-b069-92fdd2dfd67a\" alt=\"Murder Mystery 2\" loading=\"lazy\"><\u002Fdiv>\n      <div class=\"card-body\">\n        <span class=\"card-tag\">Mystery<\u002Fspan>\n        <div class=\"card-title\">Murder Mystery 2<\u002Fdiv>\n        <p class=\"card-desc\">ESP, aimbot, godmode and useful cheats for both Murderer and Sheriff roles.<\u002Fp>\n        <button class=\"card-btn\"><svg width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" viewBox=\"0 0 24 24\"><path d=\"M8 9l4-4 4 4M12 5v11M5 19h14\"><\u002Fpath><\u002Fsvg>Get Script<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card sab\" onclick=\"openModal('sab')\">\n      <div class=\"card-thumb-wrap\"><img src=\"673a3a07-091a-4a03-9613-5aeb33182218\" alt=\"Steal A Brainrot\" loading=\"lazy\"><\u002Fdiv>\n      <div class=\"card-body\">\n        <span class=\"card-tag\">Tycoon<\u002Fspan>\n        <div class=\"card-title\">Steal A Brainrot<\u002Fdiv>\n        <p class=\"card-desc\">Auto trade, auto steal, dupe items and a built-in Discord notification system.<\u002Fp>\n        <button class=\"card-btn\"><svg width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" viewBox=\"0 0 24 24\"><path d=\"M8 9l4-4 4 4M12 5v11M5 19h14\"><\u002Fpath><\u002Fsvg>Get Script<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n\n    <div class=\"card bf\" onclick=\"openModal('bf')\">\n      <div class=\"card-thumb-wrap\"><img src=\"9073f49b-b6af-4b29-afbf-3f896a97fba8\" alt=\"Blox Fruits\" loading=\"lazy\"><\u002Fdiv>\n      <div class=\"card-body\">\n        <span class=\"card-tag\">Adventure<\u002Fspan>\n        <div class=\"card-title\">Blox Fruits<\u002Fdiv>\n        <p class=\"card-desc\">Auto farm devil fruits, auto grind, teleport and boss farming automation.<\u002Fp>\n        <button class=\"card-btn\"><svg width=\"15\" height=\"15\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" viewBox=\"0 0 24 24\"><path d=\"M8 9l4-4 4 4M12 5v11M5 19h14\"><\u002Fpath><\u002Fsvg>Get Script<\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n\n  <div class=\"footer\">Made by Khang &nbsp;·&nbsp; Paste into your executor and hit Execute<\u002Fdiv>\n<\u002Fdiv>\n\n<div class=\"overlay\" id=\"overlay\" onclick=\"handleOverlayClick(event)\">\n  <div class=\"modal\" id=\"modal\">\n    <img class=\"modal-banner\" id=\"modal-banner\" src=\"\" alt=\"\">\n    <div class=\"modal-inner\">\n      <div class=\"modal-header\">\n        <span class=\"modal-title\" id=\"modal-title\"><\u002Fspan>\n        <button class=\"close-btn\" onclick=\"closeModal()\">✕<\u002Fbutton>\n      <\u002Fdiv>\n      <div class=\"modal-label\">Script — copy &amp; paste into your executor<\u002Fdiv>\n      <div class=\"script-box\" id=\"script-text\"><\u002Fdiv>\n      <button class=\"copy-btn idle\" id=\"copy-btn\" onclick=\"copyScript()\">\n        <svg id=\"copy-icon\" width=\"16\" height=\"16\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" viewBox=\"0 0 24 24\"><rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"><\u002Frect><path d=\"M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1\"><\u002Fpath><\u002Fsvg>\n        <span id=\"copy-label\">Copy Script<\u002Fspan>\n      <\u002Fbutton>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Fdiv>\n\n<script>\n  const canvas = document.getElementById('stars-canvas');\n  const ctx = canvas.getContext('2d');\n  let stars = [];\n  function resize() {\n    canvas.width = window.innerWidth;\n    canvas.height = window.innerHeight;\n    stars = Array.from({length: 130}, () => ({\n      x: Math.random() * canvas.width, y: Math.random() * canvas.height,\n      r: Math.random() * 1.4 + .3, a: Math.random() * Math.PI * 2, speed: Math.random() * .004 + .002\n    }));\n  }\n  function drawStars() {\n    ctx.clearRect(0, 0, canvas.width, canvas.height);\n    stars.forEach(s => {\n      s.a += s.speed;\n      const alpha = (Math.sin(s.a) * .5 + .5) * .7 + .1;\n      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);\n      ctx.fillStyle = `rgba(200,190,255,${alpha})`; ctx.fill();\n    });\n    requestAnimationFrame(drawStars);\n  }\n  resize(); window.addEventListener('resize', resize); drawStars();\n\n  const scripts = {\n    gag: { title: '🌱 Grow A Garden 2', img: 'https://tr.rbxcdn.com/180DAY-d3506c96f41fb1085677cfc175c2bad3/768/432/Image/Webp/noFilter', code: 'loadstring(game:HttpGet(\"https://raw.githubusercontent.com/Hub-dev33/Main/refs/heads/main/ALLinOne.lua\"))()' },\n    mm2: { title: '🔪 Murder Mystery 2', img: 'https://tr.rbxcdn.com/180DAY-fe7335c3ad752e84323cd81ae38de69a/768/432/Image/Webp/noFilter', code: 'loadstring(game:HttpGet(\"https://raw.githubusercontent.com/Hub-dev33/Main/refs/heads/main/ALLinOne.lua\"))()' },\n    sab: { title: '🧠 Steal A Brainrot', img: 'https://tr.rbxcdn.com/180DAY-30a62664e838df470ec079b7fc171637/768/432/Image/Webp/noFilter', code: 'loadstring(game:HttpGet(\"https://raw.githubusercontent.com/Hub-dev33/Main/refs/heads/main/ALLinOne.lua\"))()' },\n    bf: { title: '🍈 Blox Fruits', img: 'https://tr.rbxcdn.com/180DAY-65f8caa6b19f89964141f27c1e3b7fa0/768/432/Image/Webp/noFilter', code: 'loadstring(game:HttpGet(\"https://raw.githubusercontent.com/Khangdz28/Mains/refs/heads/main/BloxFruits\"))()' }\n  };\n\n  let copyTimer = null;\n  function openModal(key) {\n    const d = scripts[key];\n    document.getElementById('modal-title').textContent = d.title;\n    document.getElementById('modal-banner').src = d.img;\n    document.getElementById('modal-banner').alt = d.title;\n    document.getElementById('script-text').textContent = d.code;\n    resetCopyBtn();\n    document.getElementById('overlay').classList.add('open');\n    document.body.style.overflow = 'hidden';\n  }\n  function closeModal() {\n    document.getElementById('overlay').classList.remove('open');\n    document.body.style.overflow = '';\n    if (copyTimer) clearTimeout(copyTimer);\n  }\n  function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }\n  function copyScript() {\n    const text = document.getElementById('script-text').textContent;\n    navigator.clipboard.writeText(text).then(() => {\n      const btn = document.getElementById('copy-btn');\n      const label = document.getElementById('copy-label');\n      const icon = document.getElementById('copy-icon');\n      btn.classList.replace('idle', 'success');\n      label.textContent = 'Copied!';\n      icon.innerHTML = '<path stroke-linecap=\"round\" stroke-linejoin=\"round\" d=\"M5 13l4 4L19 7\"/>';\n      if (copyTimer) clearTimeout(copyTimer);\n      copyTimer = setTimeout(resetCopyBtn, 2500);\n    }).catch(() => { alert('Copy failed — please select the text and copy manually!'); });\n  }\n  function resetCopyBtn() {\n    const btn = document.getElementById('copy-btn');\n    const label = document.getElementById('copy-label');\n    const icon = document.getElementById('copy-icon');\n    btn.classList.replace('success', 'idle');\n    label.textContent = 'Copy Script';\n    icon.innerHTML = '<rect x=\"9\" y=\"9\" width=\"13\" height=\"13\" rx=\"2\"/><path d=\"M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1\"/>';\n  }\n  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
